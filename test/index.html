<html>
<head>
<meta name="viewport" content="width=device-width">
<style type="text/css">
@font-face {
 font-family: Shaikh Hamdullah Mushaf;
 src: url("ShaikhHamdullahMushaf.eot") /* EOT file for IE */
}
@font-face {
 font-family: Shaikh Hamdullah Mushaf;
 src: url("ShaikhHamdullahMushaf.ttf") /* TTF file for CSS3 browsers */
}
.arapceMetin{
  font-family: Shaikh Hamdullah Mushaf;
}

.scrollable-menu {
    height: auto;
    max-height: 200px;
    overflow-x: hidden;
}
</style>
<link href="css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="js/jquery-ui.css">
</head>
<body>

<div class=".container">
<br>
<div class="row">
  <div class="col-md-2"></div>
  <div class="col-md-8">
    <h3 align="center" class="arapcaMetin" id="ready"></h3>
  </div>
  <div class="col-md-2">
    <div id="settingsOpenButton" class="btn btn-default btn-lg glyphicon glyphicon-cog"></div>
  </div>
</div>
<br>
</div>

<div id="settings" class=".container">
<div  class="row" align="center">
  <div class="col-md-12">
    <button id="backSure" type="button" class="btn btn-default btn-lg">&laquo;</button>
    <div class="btn-group">
      <button type="button" class="btn sure btn-default btn-lg dropdown-toggle" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
        Fatiha
      </button>
      <ul id="sureDropdown" class="dropdown-menu scrollable-menu">

      </ul>
    </div>
    <button id="nextSure" type="button" class="btn btn-default btn-lg">&raquo;</button>
  </div>
</div>
<br>
<div  class="row" align="center">
  <div class="col-md-12">
    <div id="chooseType" class="btn-group" role="group" aria-label="...">
        <button type="button" class="btn typeButton btn-default btn-lg">ayet ayet</button>
        <button type="button" class="btn typeButton btn-default btn-lg">kelime kelime</button>
    </div>
  </div>
</div>
<br>
<div  class="row" align="center">
  <div class="col-md-12">
    <div id="chooseRandom" class="btn-group" role="group" aria-label="...">
        <button type="button" class="btn randomButton btn-default btn-lg">sirayla</button>
        <button type="button" class="btn randomButton btn-default btn-lg">rastgele</button>
    </div>
  </div>
</div>
<br>
<div  class="row" align="center">
  <div class="col-md-4"></div>
  <div class="col-md-4">
      <div id="chooseAyet" style="font-size: 30px;"></div>
  </div>
  <div class="col-md-4"></div>
</div>
<br>
<div class="row" align="center">
  <div class="col-md-12">
      Ben <a class="sure">Fatiha</a> suresinin <a id="ayet">1 ile 7</a> arasini <a id="type">ayet ayet</a>  ve <a id="random">sirayla</a> calisacagim.
  </div>
</div>
<br>
<div  class="row" align="center">
  <div class="col-md-12">
      <div id="settingsCloseButton"  class="btn btn-default btn-lg" aria-label="...">Taman</div>
  </div>
</div>
<br>
</div>

<div id="questionsScreen" class=".container">
  <div  class="row" align="center">
      <div class="col-md-12" id="question" class="arapcaMetin"></div>
  </div>
</div>
<div id="answerScreen" class=".container">
  <div class="row" align="center">
      <div class="col-md-12" id="answer">Cevap</div>
  </div>
  <div  class="row" align="center">
    <div class="col-md-1"></div>
    <div class="col-md-4"><button type="button" class="btn btn-default btn-lg">Tekrar</button></div>
    <div class="col-md-2"></div>
    <div class="col-md-4"><button type="button" class="btn btn-default btn-lg">Bildim</button></div>
    <div class="col-md-1"></div>
  </div>
</div>

</body>
</html>

<script src="js/jquery-1.12.1.min.js"></script>
<script src="js/jquery-ui.js"></script>
<script src="js/bootstrap.js"></script>
<script src="js/jquery.ui.touch-punch.min.js"></script>
<script>

var seciliSure = 1
var seciliAyetBegin = 1
var seciliAyetEnd = 7
var seciliType = "ayet ayet" // ayet ayet,kelime kelime
var seciliRandom = "sirayla" //sirayla,rastgele

var turkceAyet
var arapcaAyet
var transliterasyonAyet
var sureler
var turkceKelime
var arapcaKelime

var sorular
var cevaplar

var surelerFuture = $.getJSON( "./sure.json")
var turkceAyetFuture = $.getJSON( "./turkceAyet.json")
var arapcaAyetFuture = $.getJSON( "./arapcaAyet.json")
var transliterasyonAyetFuture = $.getJSON( "./transliterasyonAyet.json")
var turkceKelimeFuture = $.getJSON( "./turkceKelime.json")
var arapcaKelimefuture = $.getJSON( "./arapcaKelime.json")

$("#questionsScreen").hide();
$("#answerScreen").hide();

// 6235 = 29 * 5 * 43 = 145 * 43
$.when(turkceAyetFuture, arapcaAyetFuture, transliterasyonAyetFuture, surelerFuture, turkceKelimeFuture , arapcaKelimefuture)
 .then(function(v1, v2 , v3 , v4 , v5, v6) {
    turkceAyet = v1[0]
    arapcaAyet = v2[0]
    transliterasyonAyet = v3[0]
    sureler = v4[0]
    turkceKelime = v5[0]
    arapcaKelime = v6[0]
    $("#ready").text(arapcaAyet[0].ayet);

    var sd = ""
    for(var i = 0 ; i < sureler.length; i++){
      sd += "<li>"
      sd += "<a href=\"#\">"
      sd += sureler[i].sureAdi
      sd += "</a>"
      sd += "</li>"
    }
    $("#sureDropdown").html(sd);
    $("#sureDropdown li a").click(function(event){
      var sa = $(this).text()
      var s = sureler.filter(function (n,i){
        return n.sureAdi===sa;
      });
      seciliSure = s[0].sureNo
      adjustSlider()
    })

})

$("#backSure").click(function(event) {
  if(seciliSure == 1){
    seciliSure = 114
  } else {
    seciliSure--
  }
  adjustSlider()
})

$("#nextSure").click(function(event) {
  if(seciliSure == 114){
    seciliSure = 1
  } else {
    seciliSure++
  }
  adjustSlider()
})

function adjustSlider(){
  $(".sure").text(sureler[seciliSure].sureAdi);
  $( "#chooseAyet" ).slider( "option", "max", sureler[seciliSure].ayetNo );
  $( "#chooseAyet" ).slider( "option", "values", [ 1, sureler[seciliSure].ayetNo ] );
  $( "#ayet" ).text( 1 + " ile " + sureler[seciliSure].ayetNo );
  seciliAyetBegin = 1
  seciliAyetEnd = sureler[seciliSure].ayetNo
}

$("#chooseAyet").slider({
  range: true,
  min: 1,
  max: 7,
  values: [ 1, 7 ],
  slide: function( event, ui ) {
    $( "#ayet" ).text( ui.values[ 0 ] + " ile " + ui.values[ 1 ] );
    seciliAyetBegin = ui.values[ 0 ]
    seciliAyetEnd = ui.values[ 1 ]
  }
})

$(".typeButton").click(function(event) {
    seciliType = event.target.textContent
    $("#type").text(event.target.textContent);
})

$(".randomButton").click(function(event) {
  seciliRandom = event.target.textContent
  $("#random").text(event.target.textContent);
})

$("#settingsCloseButton").click(function(event) {
  $("#settings").hide("blind");
  $("#questionsScreen").show("blind");

  if(seciliType=="ayet ayet"){
    sorular = arapcaAyet.filter(function (n,i){
      return n.sureNo==seciliSure && n.ayetNo>=seciliAyetBegin && n.ayetNo<=seciliAyetEnd;
    });
  } else {
    sorular = arapcaKelime.filter(function (n,i){
      return n.sureNo==seciliSure && n.ayetNo>=seciliAyetBegin && n.ayetNo<=seciliAyetEnd;
    });
  }

  if(seciliRandom=="rastgele"){
    shuffle(sorular)
  }
  soruIndex = 0
  showQuestion()
})

$("#settingsOpenButton").click(function(event) {
  $("#questionsScreen").hide("blind");
  $("#settings").hide("blind");
  $("#settings").show("blind");
})

function showQuestion(){
  if(sorular.length != 0){
      $("#question").html("<h1>" + sorular[soruIndex].ayet + "</h1>")
  }
}
function shuffle(a) {
    var j, x, i;
    for (i = a.length; i; i -= 1) {
        j = Math.floor(Math.random() * i);
        x = a[i - 1];
        a[i - 1] = a[j];
        a[j] = x;
    }
}
</script>
